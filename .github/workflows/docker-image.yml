name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel tag to publish"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER}/makershelf-server"
          HUB_IMAGE="${OWNER}/makershelf-server"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          CHANNEL="${{ github.event.inputs.channel || '' }}"
          IS_PRERELEASE="false"
          if [[ "${GITHUB_REF_NAME}" =~ (alpha|beta|rc) ]]; then
            IS_PRERELEASE="true"
          fi
          if [[ -z "${CHANNEL}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* && "${IS_PRERELEASE}" == "false" ]]; then
              CHANNEL="stable"
            else
              CHANNEL="beta"
            fi
          fi
          VERSION="$(node -p "require('./package.json').version")"

          {
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "hub_image=${HUB_IMAGE}"
            echo "version=${VERSION}"
            echo "channel=${CHANNEL}"
            echo "is_prerelease=${IS_PRERELEASE}"
            echo "server_tags<<EOF"
            echo "${GHCR_IMAGE}:${SHA_TAG}"
            echo "${GHCR_IMAGE}:${CHANNEL}"
            echo "${HUB_IMAGE}:${CHANNEL}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
              echo "${GHCR_IMAGE}:${GITHUB_REF_NAME}"
              echo "${HUB_IMAGE}:${GITHUB_REF_NAME}"
              if [[ "${IS_PRERELEASE}" == "false" ]]; then
                echo "${GHCR_IMAGE}:latest"
                echo "${HUB_IMAGE}:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        id: server_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DATABASE_PROVIDER=postgresql
            DATABASE_URL=postgresql://makershelf:makershelf@localhost:5432/makershelf
            MAKERSHELF_PRODUCT_PROFILE=server
            MAKERSHELF_DEPLOYMENT_MODE=docker-team
            MAKERSHELF_DATA_BACKEND=postgres
            MAKERSHELF_STORAGE_DRIVER=filesystem
            MAKERSHELF_APP_NAME=makershelf Server
          tags: ${{ steps.prep.outputs.server_tags }}
          labels: |
            org.opencontainers.image.title=makershelf Server
            org.opencontainers.image.description=makershelf Server Edition — 3D print file and project manager for teams
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Build public release image archive
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            DATABASE_PROVIDER=postgresql
            DATABASE_URL=postgresql://makershelf:makershelf@localhost:5432/makershelf
            MAKERSHELF_PRODUCT_PROFILE=server
            MAKERSHELF_DEPLOYMENT_MODE=docker-team
            MAKERSHELF_DATA_BACKEND=postgres
            MAKERSHELF_STORAGE_DRIVER=filesystem
            MAKERSHELF_APP_NAME=makershelf Server
          tags: |
            ${{ steps.prep.outputs.ghcr_image }}:beta
            ${{ steps.prep.outputs.ghcr_image }}:${{ github.ref_name }}
          outputs: type=docker,dest=/tmp/makershelf-server-${{ github.ref_name }}.tar

      - name: Compress public release image archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: gzip -9 /tmp/makershelf-server-${{ github.ref_name }}.tar

      - name: Create server release manifest
        env:
          MAKERSHELF_RELEASE_CHANNEL: ${{ steps.prep.outputs.channel }}
          MAKERSHELF_RELEASE_VERSION: ${{ steps.prep.outputs.version }}
          MAKERSHELF_IMAGE: ${{ steps.prep.outputs.ghcr_image }}:${{ steps.prep.outputs.channel }}
          MAKERSHELF_IMAGE_DIGEST: ${{ steps.server_build.outputs.digest }}
          MAKERSHELF_IMAGE_TAGS: ${{ steps.prep.outputs.server_tags }}
          MAKERSHELF_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MAKERSHELF_CHANGELOG_URL: https://github.com/NilsN3DP/makershelf/releases/tag/${{ github.ref_name }}
        run: node scripts/create-server-release-manifest.mjs

      - name: Create GitHub release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: makershelf Server ${{ github.ref_name }}
          prerelease: ${{ steps.prep.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prep.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          body: |
            ## makershelf Server ${{ github.ref_name }}

            **Docker Hub:** `docker pull nilsn3dp/makershelf-server:beta`
            **GHCR:** `docker pull ghcr.io/nilsn3dp/makershelf-server:beta`

            ### Quick start

            ```bash
            docker compose -f docker-compose.server.yml up -d
            ```

            Open http://localhost:3000/setup and create your workspace.

            ### Unraid

            Install via Unraid Community Apps — search for **makershelf**.
            Template: `deploy/makershelf-unraid.xml`
          files: |
            dist/server-release-manifest.json
            /tmp/makershelf-server-${{ github.ref_name }}.tar.gz
